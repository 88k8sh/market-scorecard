<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Signal Scorecard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,Helvetica,Arial,sans-serif;background:#FBFAF6;color:#2C2C2A;font-size:13px}
#hdr{padding:12px 20px 10px;border-bottom:1px solid #E0DED7;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
#hdr h1{font-size:15px;font-weight:700}
.meta{font-size:11px;color:#6B6A64}
.badge{font-size:10px;font-weight:600;color:#9A4A2A;border:1px solid #D08060;border-radius:3px;padding:1px 7px;margin-left:auto}
#ctrl{padding:8px 20px;border-bottom:1px solid #E0DED7;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
#ctrl label{font-size:11px;color:#6B6A64}
select{font-size:12px;border:1px solid #D3D1C7;border-radius:4px;padding:2px 6px;background:#FBFAF6;cursor:pointer;color:#2C2C2A}
.arch-btn{font-size:11px;border:1px solid #D3D1C7;border-radius:10px;padding:2px 10px;background:#FBFAF6;cursor:pointer;color:#6B6A64}
.arch-btn.active{background:#2C2C2A;color:#FBFAF6;border-color:#2C2C2A}
.sep{width:1px;height:16px;background:#E0DED7;display:inline-block;margin:0 4px}
#cross{overflow-x:auto;padding:4px 20px 24px}
table{border-collapse:collapse;min-width:900px}
th{font-size:11px;font-weight:600;padding:8px 3px 6px;text-align:center;color:#6B6A64;border-bottom:2px solid #E0DED7;cursor:pointer;white-space:nowrap;user-select:none;min-width:76px}
th:hover{color:#2C2C2A}
th.sorted{color:#2C2C2A}
th.sorted::after{content:" \25BC";font-size:8px}
th.sorted.asc::after{content:" \25B2"}
th.stk{text-align:left;min-width:130px;cursor:default}
td{padding:2px 2px}
td.stkn{padding:3px 10px 3px 3px;white-space:nowrap;vertical-align:middle}
.tkr{font-weight:700;font-size:13px;cursor:pointer;color:#2C2C2A}
.tkr:hover{text-decoration:underline}
.sname{font-size:10px;color:#6B6A64;display:block;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:hover td{filter:brightness(0.96)}
.cell{width:74px;height:42px;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;border-left:2px solid transparent}
.cell:hover{filter:brightness(0.9);cursor:default}
.rawv{font-size:12px;font-weight:600;line-height:1.2;pointer-events:none}
.idot{position:absolute;top:3px;right:3px;border-radius:50%;pointer-events:none}
#tree{display:none;padding:20px}
#tree.vis{display:block}
#cross.hide{display:none}
#back{font-size:12px;color:#6B6A64;cursor:pointer;margin-bottom:12px;display:inline-block}
#back:hover{color:#2C2C2A}
#thdr h2{font-size:17px;font-weight:700}
#thdr .sub{font-size:11px;color:#6B6A64;margin-top:3px}
#tsvgw{margin-top:14px}
svg#tsvg{width:100%;max-width:800px;display:block}
#tt{position:fixed;background:#1A1917;color:#F4F3EE;border-radius:6px;padding:9px 13px;font-size:11.5px;pointer-events:none;opacity:0;transition:opacity .1s;max-width:270px;z-index:100;line-height:1.55}
#tt.vis{opacity:1}
.tt-lbl{font-weight:700;font-size:13px;margin-bottom:2px}
.tt-raw{font-size:15px;font-weight:700;color:#C0DD97}
.tt-s{color:#D3D1C7}
.tt-w{color:#D3D1C7;font-size:10.5px}
.tt-basis{color:#888780;font-size:10px;margin-top:5px;border-top:1px solid #2C2C2A;padding-top:4px}
.tt-na{color:#888780}
.conv-cell{width:52px;height:42px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;cursor:default;flex-shrink:0}
td.conv-td{padding:2px 4px 2px 2px}
th.th-conv{min-width:60px}
</style>
</head>
<body>
<div id="hdr">
  <h1>Signal Scorecard</h1>
  <span class="meta" id="gtime"></span>
  <span class="badge">ANALYSIS ONLY</span>
</div>
<div id="ctrl">
  <label>Sort</label>
  <select id="srt"><option value="_conv">Conviction</option><option value="_t">Ticker</option></select>
  <select id="sdir"><option value="desc">Strongest \u2191</option><option value="asc">Weakest \u2191</option></select>
  <span class="sep"></span>
  <label>Archetype</label>
  <button class="arch-btn active" data-arch="all">All</button>
</div>
<div id="cross">
  <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
</div>
<div id="tree">
  <span id="back">\u2190 All stocks</span>
  <div id="thdr"><h2 id="t-tk"></h2><div class="sub" id="t-sub"></div></div>
  <div id="tsvgw"><svg id="tsvg" viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg"></svg></div>
</div>
<div id="tt"></div>
<script>
const DATA={"keys": ["pe", "relval", "peg", "growth", "quality", "momentum", "technical", "sentiment", "risk", "dividend", "size", "policy"], "labels": {"pe": "P/E", "relval": "EV/EBITDA", "peg": "PEG", "growth": "Growth", "quality": "Quality", "momentum": "Momentum", "technical": "Technical", "sentiment": "Sentiment", "risk": "Balance sht", "dividend": "Dividend", "size": "Size/liq", "policy": "Policy"}, "stocks": [{"ticker": "AAPL", "name": "Apple Inc", "fund_asof": "2026-03-31", "price_asof": "2026-06-17", "basis_tag": "abs+ownhist-v1", "conviction": 56, "mix": {"high-growth": 0.474, "established-compounder": 0.474}, "vectors": {"pe": {"label": "P/E", "raw": "36x", "s": -0.619, "sign": -1, "strength": 0.619, "present": true, "basis": "abs anchor 22 (log)", "nullkind": null, "w": 0.0995, "mcap_num": null}, "relval": {"label": "EV/EBITDA", "raw": "27x", "s": -0.954, "sign": -1, "strength": 0.954, "present": true, "basis": "abs EV12/PB2.5", "nullkind": null, "w": 0.0789, "mcap_num": null}, "peg": {"label": "PEG", "raw": "2.35", "s": -0.815, "sign": -1, "strength": 0.815, "present": true, "basis": "abs anchor 1.0 (log)", "nullkind": null, "w": 0.0814, "mcap_num": null}, "growth": {"label": "Growth", "raw": "+19%", "s": 0.46, "sign": 1, "strength": 0.46, "present": true, "basis": "abs base 8%", "nullkind": null, "w": 0.1513, "mcap_num": null}, "quality": {"label": "Quality", "raw": "ROE 141%", "s": 0.964, "sign": 1, "strength": 0.964, "present": true, "basis": "abs ROE12/net10", "nullkind": null, "w": 0.1439, "mcap_num": null}, "momentum": {"label": "Momentum", "raw": "+53%", "s": 0.82, "sign": 1, "strength": 0.82, "present": true, "basis": "12-1 abs base 8%", "nullkind": null, "w": 0.113, "mcap_num": null}, "technical": {"label": "Technical", "raw": "87% rng", "s": 0.689, "sign": 1, "strength": 0.689, "present": true, "basis": "own 52w + SMA200", "nullkind": null, "w": 0.0679, "mcap_num": null}, "sentiment": {"label": "News tone Δ", "raw": "-0.21", "s": -0.61, "sign": -1, "strength": 0.61, "present": true, "basis": "Δ vs med+0.99 10d·n500", "nullkind": null, "w": 0.0939, "mcap_num": null}, "risk": {"label": "Balance sht", "raw": "0.3x", "s": 0.638, "sign": 1, "strength": 0.638, "present": true, "basis": "abs ND/EBITDA 2.0x", "nullkind": null, "w": 0.0756, "mcap_num": null}, "dividend": {"label": "Dividend", "raw": "0.4%", "s": -0.622, "sign": -1, "strength": 0.622, "present": true, "basis": "abs 2% + payout gate", "nullkind": null, "w": 0.0468, "mcap_num": null}, "size": {"label": "Size/liq", "raw": "$4.35T", "s": 0.4, "sign": 1, "strength": 0.4, "present": true, "basis": "abs $20M/day band", "nullkind": null, "w": 0.0477, "mcap_num": 4353626210304.0}, "policy": {"label": "Policy", "raw": "no data", "s": 0.0, "sign": 0, "strength": 0.08, "present": false, "basis": "0 trades in 180d", "nullkind": "na", "w": 0.0, "mcap_num": null}}}], "generated": "2026-06-17 21:58"};
const G=["#EAF3DE","#C0DD97","#97C459","#639922","#3B6D11"];
const R=["#FCEBEB","#F7C1C1","#F09595","#E24B4A","#A32D2D"];
const GR=["#F1EFE8","#D3D1C7","#B4B2A9","#888780","#5F5E5A"];
function bkt(st){st=Math.abs(st);return st<.2?0:st<.4?1:st<.6?2:st<.8?3:4}
function cfill(sgn,st){return(sgn>0?G:sgn<0?R:GR)[bkt(st)]}
function ctxt(sgn,st){const b=bkt(st);if(!sgn)return b<=2?"#2C2C2A":"#F1EFE8";return b<=2?(sgn>0?"#173404":"#501313"):(sgn>0?"#EAF3DE":"#FCEBEB")}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
const TT=document.getElementById("tt");
function showTT(e,v){
  let h=`<div class="tt-lbl">${esc(v.label)}</div>`;
  if(!v.present){
    const why=v.nullkind==="pending"?" \u2014 pending data source":v.nullkind==="na"?" \u2014 not applicable":"";
    h+=`<div class="tt-na">No read${why}</div>`;
  } else {
    const ss=(v.s>=0?"+":"")+v.s.toFixed(2);
    const sc=v.s>0?"#C0DD97":v.s<0?"#F09595":"#D3D1C7";
    h+=`<div class="tt-raw">${esc(v.raw)}</div>`;
    h+=`<div class="tt-s">s = <span style="color:${sc};font-weight:600">${ss}</span></div>`;
    h+=`<div class="tt-w">importance = ${(v.w*100).toFixed(1)}%</div>`;
  }
  h+=`<div class="tt-basis">${esc(v.basis)}</div>`;
  TT.innerHTML=h; TT.classList.add("vis"); moveTT(e);
}
function moveTT(e){
  const x=e.clientX+14,y=e.clientY-6;
  TT.style.left=(x+TT.offsetWidth>window.innerWidth-8?x-TT.offsetWidth-24:x)+"px";
  TT.style.top=(y+TT.offsetHeight>window.innerHeight-8?y-TT.offsetHeight:y)+"px";
}
function hideTT(){TT.classList.remove("vis")}
let sKey="_conv",sDir="desc",arch="all",stocks={};
const KEYS=DATA.keys,LBL=DATA.labels;
function buildTable(){
  const head=document.getElementById("thead");
  let h="<tr><th class='stk'>Stock</th><th class='th-conv' data-s='_conv' title='Conviction score 1\u2013100 (weighted composite of all signals)'>Conv</th>";
  for(const k of KEYS) h+=`<th data-s="${k}" title="${esc(LBL[k])}">${esc(LBL[k].length>9?LBL[k].slice(0,8)+"\u2026":LBL[k])}</th>`;
  h+="</tr>"; head.innerHTML=h;
  const sel=document.getElementById("srt");
  for(const k of KEYS){const o=document.createElement("option");o.value=k;o.text=LBL[k];sel.appendChild(o)}
  head.querySelectorAll("th[data-s]").forEach(th=>{
    th.addEventListener("click",()=>{
      sKey===th.dataset.s?(sDir=sDir==="desc"?"asc":"desc"):(sKey=th.dataset.s,sDir="desc");
      renderTable();
    });
  });
  renderTable();
}
function sortedStocks(){
  let list=Object.values(stocks);
  if(arch!=="all") list=list.filter(s=>{
    const top=Object.entries(s.mix||{}).sort((a,b)=>b[1]-a[1])[0];
    return top&&top[0].includes(arch);
  });
  list.sort((a,b)=>{
    if(sKey==="_t") return sDir==="asc"?a.ticker.localeCompare(b.ticker):b.ticker.localeCompare(a.ticker);
    if(sKey==="_conv"){const ac=a.conviction??0,bc=b.conviction??0;return sDir==="desc"?bc-ac:ac-bc;}
    const av=a.vectors[sKey],bv=b.vectors[sKey];
    if(!av||!bv)return 0;
    // size column: sort by actual market cap, not the clamped signal s
    if(sKey==="size"){
      const an=av.mcap_num,bn=bv.mcap_num;
      if(an==null&&bn==null)return 0;
      if(an==null)return 1; if(bn==null)return -1;
      return sDir==="desc"?bn-an:an-bn;
    }
    if(!av.present&&!bv.present)return 0;
    if(!av.present)return 1; if(!bv.present)return -1;
    return sDir==="desc"?bv.s-av.s:av.s-bv.s;
  });
  return list;
}
function renderTable(){
  const body=document.getElementById("tbody");
  document.querySelectorAll("th[data-s]").forEach(th=>{
    th.classList.toggle("sorted",th.dataset.s===sKey);
    th.classList.toggle("asc",th.dataset.s===sKey&&sDir==="asc");
  });
  let h="";
  for(const s of sortedStocks()){
    const topK=KEYS.slice().sort((a,b)=>(s.vectors[b].w*s.vectors[b].strength)-(s.vectors[a].w*s.vectors[a].strength))[0];
    const cv=s.conviction;
    const cvfill=cv==null?"#F1EFE8":cv>=71?"#3B6D11":cv>=56?"#639922":cv>=46?"#D3D1C7":cv>=31?"#F09595":"#E24B4A";
    const cvtc=cv==null?"#888780":cv>=71?"#EAF3DE":cv>=56?"#EAF3DE":cv>=46?"#5F5E5A":cv>=31?"#501313":"#FCEBEB";
    h+=`<tr><td class="stkn"><span class="tkr" data-t="${s.ticker}">${esc(s.ticker)}</span><span class="sname">${esc(s.name)}</span></td>`;
    h+=`<td class="conv-td"><div class="conv-cell" style="background:${cvfill};color:${cvtc}" title="Conviction ${cv!=null?cv:'n/a'}/100">${cv!=null?cv:"\u2014"}</div></td>`;
    for(const k of KEYS){
      const v=s.vectors[k];
      const fill=v.present?cfill(v.sign,v.strength):"#F1EFE8";
      const tc=v.present?ctxt(v.sign,v.strength):"#888780";
      const bw=v.present?Math.max(2,Math.round(v.w*28)):0;
      const bc=v.present?(v.sign>0?G[4]:v.sign<0?R[4]:GR[3]):"transparent";
      const dr=v.present?Math.round(2+6*Math.sqrt(v.w)):0;
      const topBar=k===topK&&v.present?`<div style="position:absolute;left:0;top:6px;width:3px;height:30px;border-radius:0 2px 2px 0;background:${tc};opacity:0.55"></div>`:"";
      const dot=v.present?`<div class="idot" style="width:${dr*2}px;height:${dr*2}px;background:${tc};opacity:0.42"></div>`:"";
      const pend=v.nullkind==="pending"?"border:1px dashed #B4B2A9;":"";
      h+=`<td><div class="cell" style="background:${fill};border-left-width:${bw}px;border-left-color:${bc};${pend}" data-t="${s.ticker}" data-k="${k}">${topBar}<span class="rawv" style="color:${tc}">${v.present?esc(v.raw):"\u2014"}</span>${dot}</div></td>`;
    }
    h+="</tr>";
  }
  body.innerHTML=h;
  body.querySelectorAll(".cell").forEach(el=>{
    el.addEventListener("mouseenter",e=>{const s=stocks[el.dataset.t];if(s)showTT(e,s.vectors[el.dataset.k])});
    el.addEventListener("mousemove",moveTT);
    el.addEventListener("mouseleave",hideTT);
  });
  body.querySelectorAll(".tkr").forEach(el=>el.addEventListener("click",()=>showTree(el.dataset.t)));
}
function sliceDice(items,x,y,w,h,hz){
  if(!items.length)return [];
  if(items.length===1)return [{...items[0],x,y,w,h}];
  const tot=items.reduce((s,i)=>s+i.weight,0);
  let half=0,si=0;
  for(let i=0;i<items.length;i++){half+=items[i].weight;if(half*2>=tot){si=i+1;break}}
  const r=half/tot,a=items.slice(0,si),b=items.slice(si);
  return hz?[...sliceDice(a,x,y,w*r,h,!hz),...sliceDice(b,x+w*r,y,w*(1-r),h,!hz)]
           :[...sliceDice(a,x,y,w,h*r,!hz),...sliceDice(b,x,y+h*r,w,h*(1-r),!hz)];
}
function showTree(ticker){
  const s=stocks[ticker]; if(!s)return;
  document.getElementById("cross").classList.add("hide");
  document.getElementById("tree").classList.add("vis");
  document.getElementById("t-tk").textContent=ticker+"  \u00B7  "+s.name;
  const mx=Object.entries(s.mix||{}).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([a,v])=>Math.round(v*100)+"% "+a).join("  \u00B7  ");
  document.getElementById("t-sub").textContent=mx+"  \u00B7  fund "+s.fund_asof+"  \u00B7  price "+s.price_asof;
  const svg=document.getElementById("tsvg"),VW=800,VH=480,GAP=4,PAD=2;
  const items=KEYS.map(k=>({key:k,weight:s.vectors[k].w,...s.vectors[k]})).sort((a,b)=>b.weight-a.weight);
  const boxes=sliceDice(items,PAD,PAD,VW-2*PAD,VH-2*PAD,true);
  let out="";
  for(const box of boxes){
    const v=box,bx=box.x+GAP/2,by=box.y+GAP/2,bw=box.w-GAP,bh=box.h-GAP;
    if(bw<6||bh<6)continue;
    const fill=v.present?cfill(v.sign,v.strength):"#F1EFE8";
    const tc=v.present?ctxt(v.sign,v.strength):"#888780";
    const dash=v.nullkind==="pending"?' stroke="#B4B2A9" stroke-width="1" stroke-dasharray="3 3"':"";
    const lsz=Math.min(13,Math.max(7,bw/9));
    const vsz=Math.min(22,Math.max(9,Math.min(bw/5,bh/2.8)));
    out+=`<g class="tc" data-t="${ticker}" data-k="${v.key}">`;
    out+=`<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="5" fill="${fill}"${dash}/>`;
    if(bh>26&&bw>28) out+=`<text x="${(bx+8).toFixed(1)}" y="${(by+lsz+4).toFixed(1)}" font-size="${lsz}" font-weight="600" fill="${tc}" font-family="-apple-system,Helvetica,Arial,sans-serif">${esc(v.label)}</text>`;
    if(bh>48&&bw>32) out+=`<text x="${(bx+8).toFixed(1)}" y="${(by+lsz+vsz+9).toFixed(1)}" font-size="${vsz}" font-weight="700" fill="${tc}" font-family="-apple-system,Helvetica,Arial,sans-serif">${esc(String(v.raw))}</text>`;
    if(bh>52&&bw>46) out+=`<text x="${(bx+bw-5).toFixed(1)}" y="${(by+bh-5).toFixed(1)}" font-size="9" fill="${tc}" opacity="0.55" text-anchor="end" font-family="-apple-system,Helvetica,Arial,sans-serif">${(v.w*100).toFixed(0)}%</text>`;
    out+="</g>";
  }
  svg.innerHTML=out;
  svg.querySelectorAll(".tc").forEach(el=>{
    el.addEventListener("mouseenter",e=>{const st=stocks[el.dataset.t];if(st)showTT(e,st.vectors[el.dataset.k])});
    el.addEventListener("mousemove",moveTT);
    el.addEventListener("mouseleave",hideTT);
  });
}
document.getElementById("back").addEventListener("click",()=>{
  document.getElementById("tree").classList.remove("vis");
  document.getElementById("cross").classList.remove("hide");
});
document.getElementById("srt").addEventListener("change",e=>{sKey=e.target.value;sDir="desc";document.getElementById("sdir").value="desc";renderTable()});
document.getElementById("sdir").addEventListener("change",e=>{sDir=e.target.value;renderTable()});
function buildArchBtns(){
  const archs=new Set();
  Object.values(stocks).forEach(s=>Object.keys(s.mix||{}).forEach(a=>archs.add(a)));
  const ctrl=document.getElementById("ctrl");
  [...archs].sort().forEach(a=>{
    const b=document.createElement("button");
    b.className="arch-btn"; b.dataset.arch=a;
    const AL={"high-growth":"Growth","established-compounder":"Compounder","deep-value-cyclical":"Value/Cyc","speculative-story":"Speculative","dividend-income":"Dividend"};
    b.textContent=AL[a]||a.split("-")[0];
    b.title=a; ctrl.appendChild(b);
    b.addEventListener("click",()=>{
      arch=b.dataset.arch===arch?"all":b.dataset.arch;
      document.querySelectorAll(".arch-btn").forEach(x=>x.classList.toggle("active",x.dataset.arch===arch||(arch==="all"&&x.dataset.arch==="all")));
      renderTable();
    });
  });
}
document.getElementById("gtime").textContent="generated "+DATA.generated;
DATA.stocks.forEach(s=>{stocks[s.ticker]=s});
buildArchBtns();
buildTable();
</script>
</body>
</html>
