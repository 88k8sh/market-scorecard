<html lang="en">
<head>
<meta charset="utf-8">

<title>Signal Scorecard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,Helvetica,Arial,sans-serif;background:#FBFAF6;color:#2C2C2A;font-size:13px}
#hdr{padding:12px 20px 10px;border-bottom:1px solid #E0DED7;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
#hdr h1{font-size:15px;font-weight:700}
.meta{font-size:11px;color:#6B6A64}
.badge{font-size:10px;font-weight:600;color:#9A4A2A;border:1px solid #D08060;border-radius:3px;padding:1px 7px;margin-left:auto}
#ctrl{padding:8px 20px;border-bottom:1px solid #E0DED7;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
#ctrl label{font-size:11px;color:#6B6A64}
select{font-size:12px;border:1px solid #D3D1C7;border-radius:4px;padding:2px 6px;background:#FBFAF6;cursor:pointer;color:#2C2C2A}
.arch-btn{font-size:11px;border:1px solid #D3D1C7;border-radius:10px;padding:2px 10px;background:#FBFAF6;cursor:pointer;color:#6B6A64}
.arch-btn.active{background:#2C2C2A;color:#FBFAF6;border-color:#2C2C2A}
.sep{width:1px;height:16px;background:#E0DED7;display:inline-block;margin:0 4px}
#cross{overflow-x:auto;padding:4px 20px 24px}
table{border-collapse:collapse;min-width:900px}
th{font-size:11px;font-weight:600;padding:8px 3px 6px;text-align:center;color:#6B6A64;border-bottom:2px solid #E0DED7;cursor:pointer;white-space:nowrap;user-select:none;min-width:76px}
th:hover{color:#2C2C2A}
th.sorted{color:#2C2C2A}
th.sorted::after{content:" \25BC";font-size:8px}
th.sorted.asc::after{content:" \25B2"}
th.stk{text-align:left;min-width:130px;cursor:default}
td{padding:2px 2px}
td.stkn{padding:3px 10px 3px 3px;white-space:nowrap;vertical-align:middle}
.tkr{font-weight:700;font-size:13px;cursor:pointer;color:#2C2C2A}
.tkr:hover{text-decoration:underline}
.sname{font-size:10px;color:#6B6A64;display:block;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:hover td{filter:brightness(0.96)}
.cell{width:74px;height:42px;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;border-left:2px solid transparent}
.cell:hover{filter:brightness(0.9);cursor:default}
.rawv{font-size:12px;font-weight:600;line-height:1.2;pointer-events:none}
.idot{position:absolute;top:3px;right:3px;border-radius:50%;pointer-events:none}
#tree{display:none;padding:20px}
#tree.vis{display:block}
#cross.hide{display:none}
#back{font-size:12px;color:#6B6A64;cursor:pointer;margin-bottom:12px;display:inline-block}
#back:hover{color:#2C2C2A}
#thdr h2{font-size:17px;font-weight:700}
#thdr .sub{font-size:11px;color:#6B6A64;margin-top:3px}
#tsvgw{margin-top:14px}
svg#tsvg{width:100%;max-width:800px;display:block}
#tt{position:fixed;background:#1A1917;color:#F4F3EE;border-radius:6px;padding:9px 13px;font-size:11.5px;pointer-events:none;opacity:0;transition:opacity .1s;max-width:270px;z-index:100;line-height:1.55}
#tt.vis{opacity:1}
.tt-lbl{font-weight:700;font-size:13px;margin-bottom:2px}
.tt-raw{font-size:15px;font-weight:700;color:#C0DD97}
.tt-s{color:#D3D1C7}
.tt-w{color:#D3D1C7;font-size:10.5px}
.tt-basis{color:#888780;font-size:10px;margin-top:5px;border-top:1px solid #2C2C2A;padding-top:4px}
.tt-na{color:#888780}
.conv-cell{width:52px;height:42px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;cursor:default;flex-shrink:0}
td.conv-td{padding:2px 4px 2px 2px}
th.th-conv{min-width:60px}
.delta-cell{width:36px;height:42px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;border-radius:4px;cursor:default;flex-shrink:0}
td.delta-td{padding:2px 2px 2px 0}
th.th-delta{min-width:42px;font-size:10px}
#fg-widget{display:flex;align-items:center;gap:8px;padding:4px 12px;border-radius:6px;background:#F1EFE8;border:1px solid #E0DED7;flex-shrink:0}
#fg-label{font-size:10px;color:#6B6A64;white-space:nowrap}
#fg-score{font-size:18px;font-weight:700}
#fg-rating{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
#fg-bar-wrap{width:60px;height:5px;background:#E0DED7;border-radius:3px}
#fg-bar{height:5px;border-radius:3px;transition:width .4s}
th.th-raw{min-width:56px;font-size:10px;color:#888780}
th.th-raw:hover{color:#2C2C2A}
td.raw-td{padding:2px 1px}
.raw-cell{height:42px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;border-radius:3px;cursor:default;min-width:52px}
#add-bar{display:flex;align-items:center;gap:7px;margin-left:auto}
#add-input{font-size:12px;border:1px solid #D3D1C7;border-radius:4px;padding:3px 8px;background:#FBFAF6;color:#2C2C2A;width:86px;letter-spacing:.04em;text-transform:uppercase}
#add-btn{font-size:12px;border:1px solid #D3D1C7;border-radius:4px;padding:3px 10px;background:#FBFAF6;cursor:pointer;color:#2C2C2A;white-space:nowrap}
#add-btn:hover{background:#2C2C2A;color:#FBFAF6;border-color:#2C2C2A}
#add-status{font-size:11px;color:#6B6A64;white-space:nowrap}
.spark-cell{width:52px;height:42px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
th.th-spark{min-width:58px;font-size:10px;color:#888780}
td.td-spark{padding:2px 2px}
</style>
</head>

function sortedStocks(){

  list.sort((a,b)=>{
    if(sKey==="_t") return sDir==="asc"?a.ticker.localeCompare(b.ticker):b.ticker.localeCompare(a.ticker);
    if(sKey==="_conv"){const ac=a.conviction??0,bc=b.conviction??0;return sDir==="desc"?bc-ac:ac-bc;}
    if(sKey==="_d1"||sKey==="_d7"){const f=sKey==="_d1"?"d1":"d7";const ac=a[f]??-999,bc=b[f]??-999;return sDir==="desc"?bc-ac:ac-bc;}
    if(sKey.startsWith("_r_")){const rk=sKey.slice(3);const av2=a.raw?.[rk],bv2=b.raw?.[rk];if(av2==null&&bv2==null)return 0;if(av2==null)return 1;if(bv2==null)return -1;return sDir==="desc"?bv2-av2:av2-bv2;}
    const av=a.vectors[sKey],bv=b.vectors[sKey];

function sliceDice(items,x,y,w,h,hz){
  if(!items.length)return [];
  if(items.length===1)return [{...items[0],x,y,w,h}];
  const tot=items.reduce((s,i)=>s+i.weight,0);
  let half=0,si=0;
  for(let i=0;i<items.length;i++){half+=items[i].weight;if(half*2>=tot){si=i+1;break}}
  const r=half/tot,a=items.slice(0,si),b=items.slice(si);
  return hz?[...sliceDice(a,x,y,w*r,h,!hz),...sliceDice(b,x+w*r,y,w*(1-r),h,!hz)]
           :[...sliceDice(a,x,y,w,h*r,!hz),...sliceDice(b,x,y+h*r,w,h*(1-r),!hz)];
}

  const svg=document.getElementById("tsvg"),VW=800,VH=480,GAP=4,PAD=2;
  const items=KEYS.map(k=>({key:k,weight:s.vectors[k].w,...s.vectors[k]})).sort((a,b)=>b.weight-a.weight);
  const boxes=sliceDice(items,PAD,PAD,VW-2*PAD,VH-2*PAD,true);
  let out="";
  for(const box of boxes){
    const v=box,bx=box.x+GAP/2,by=box.y+GAP/2,bw=box.w-GAP,bh=box.h-GAP;
    if(bw<6||bh<6)continue;
    const fill=v.present?cfill(v.sign,v.strength):"#F1EFE8";

    out+=`<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="5" fill="${fill}"${dash}/>`;
    if(bh>26&&bw>28) out+=`<text x="${(bx+8).toFixed(1)}" y="${(by+lsz+4).toFixed(1)}" font-size="${lsz}" font-weight="600" fill="${tc}" font-family="-apple-system,Helvetica,Arial,sans-serif">${esc(v.label)}</text>`;
    if(bh>48&&bw>32) out+=`<text x="${(bx+8).toFixed(1)}" y="${(by+lsz+vsz+9).toFixed(1)}" font-size="${vsz}" font-weight="700" fill="${tc}" font-family="-apple-system,Helvetica,Arial,sans-serif">${esc(String(v.raw))}</text>`;
    if(bh>52&&bw>46) out+=`<text x="${(bx+bw-5).toFixed(1)}" y="${(by+bh-5).toFixed(1)}" font-size="9" fill="${tc}" opacity="0.55" text-anchor="end" font-family="-apple-system,Helvetica,Arial,sans-serif">${(v.w*100).toFixed(0)}%</text>`;
    out+="</g>";
  }
  svg.innerHTML=out;
  svg.querySelectorAll(".tc").forEach(el=>{
    el.addEventListener("mouseenter",e=>{const st=stocks[el.dataset.t];if(st)showTT(e,st.vectors[el.dataset.k])});

  const ev=fl(V.EnterpriseValueEbitda),pb=fl(V.PriceBookMRQ);
  if(ev>0&&pb>0){
    const z=Math.max(-3,Math.min(3,CFG.relval.ev_wt*(Math.log(ev)-Math.log(CFG.relval.ev_anchor))/CFG.relval.ev_scale
                                  +CFG.relval.pb_wt*(Math.log(pb)-Math.log(CFG.relval.pb_anchor))/CFG.relval.pb_scale));
    out.relval=mkv('EV/EBITDA',`${Math.round(ev)}x`,Math.tanh(-z/K),'abs EV12/PB2.5','Valuation');
  } else out.relval=mkv('EV/EBITDA','n/a',null,'field null','Valuation');
  // 3 PEG
  const peg=fl(V.PEGRatio)||fl(H.PEGRatio);
  out.peg=peg>0?mkv('PEG',peg.toFixed(2),rs(Math.log(peg),Math.log(CFG.peg.anchor),CFG.peg.scale,-1),'abs anchor 1.0 (log)','Valuation.PEGRatio')
               :mkv('PEG','n/a',null,'needs +ve growth','Valuation.PEGRatio');
  // 4 Growth
  const gs=[fl(H.QuarterlyRevenueGrowthYOY),fl(H.QuarterlyEarningsGrowthYOY)].filter(x=>x!=null);
  if(gs.length){const g=gs.reduce((a,b)=>a+b,0)/gs.length;
    out.growth=mkv('Growth',`${(g*100).toFixed(0)}%`,rs(g,CFG.growth.base,CFG.growth.scale,+1),'abs base 8%','Highlights.*GrowthYOY');
  } else out.growth=mkv('Growth','n/a',null,'YoY field null','Highlights.*GrowthYOY');
  // 5 Quality
  const roe=fl(H.ReturnOnEquityTTM),nm=fl(H.ProfitMargin),gp=fl(H.GrossProfitTTM),rev=fl(H.RevenueTTM);
  const gm=(gp>0&&rev>0)?gp/rev:null;
  let zq=0,wq=0;
  if(roe!=null){zq+=CFG.quality.roe_wt*Math.max(-3,Math.min(3,(roe-CFG.quality.roe_base)/CFG.quality.roe_scale));wq+=CFG.quality.roe_wt;}
  if(nm!=null) {zq+=CFG.quality.net_wt*Math.max(-3,Math.min(3,(nm-CFG.quality.net_base)/CFG.quality.net_scale));wq+=CFG.quality.net_wt;}
  if(gm!=null) {zq+=CFG.quality.gross_wt*Math.max(-3,Math.min(3,(gm-CFG.quality.gross_base)/CFG.quality.gross_scale));wq+=CFG.quality.gross_wt;}
  let quality_s=null;
  if(wq>0){quality_s=Math.tanh((zq/wq)/K);
    const rq=roe!=null?`ROE ${(roe*100).toFixed(0)}%`:nm!=null?`NM ${(nm*100).toFixed(0)}%`:'ok';
    out.quality=mkv('Quality',rq,quality_s,'abs ROE12/net10','Highlights ROE/margins');
  } else out.quality=mkv('Quality','n/a',null,'field null','Highlights');
  // 6 Momentum
  if(closes.length>=257){
    const r=closes[closes.length-21]/closes[closes.length-252]-1;
    const last_m=closes[closes.length-1]/closes[closes.length-21]-1;
    let sm=rs(slog(r),slog(CFG.momentum.base),CFG.momentum.scale,+1);
    if(sm!=null&&r>0&&last_m<CFG.momentum.broken_last)sm=Math.min(sm,CFG.momentum.broken_cap);
    out.momentum=mkv('Momentum',`${(r*100).toFixed(0)}%`,sm,'12-1 abs base 8%','eod history');
  } else out.momentum=mkv('Momentum','n/a',null,'<13mo history','eod history');
  // 7 Technical
  const lo=fl(T['52WeekLow']),hi=fl(T['52WeekHigh']);
  const sma200v=closes.length>=200?closes.slice(-200).reduce((a,b)=>a+b,0)/200:fl(T['200DayMA']);
  if(lo&&hi&&hi>lo&&price){
    const rng=Math.max(-1,Math.min(1,((price-lo)/(hi-lo)-0.5)*2));
    const smat=sma200v?Math.max(-1,Math.min(1,(price/sma200v-1)/CFG.technical.sma_scale)):0;
    out.technical=mkv('Technical',`${Math.round((rng/2+0.5)*100)}% rng`,
      Math.tanh(CFG.technical.range_wt*rng+CFG.technical.sma_wt*smat),'own 52w + SMA200','Technicals + eod');
  } else out.technical=mkv('Technical','n/a',null,'no 52w range','Technicals');
  // 8 Sentiment — needs own-history baseline; not available in browser
  out.sentiment=mkv('Sentiment','n/a',null,'local only','news','pending');
  // 9 Policy — needs Quiver; not available in browser
  out.policy=mkv('Policy','n/a',null,'local only','Quiver','pending');
  // 10 Balance-sheet risk
  const ebitda=fl(H.EBITDA);
  let nd=null;
  if(Fbs){const ks=Object.keys(Fbs).sort();if(ks.length){const lat=Fbs[ks[ks.length-1]];
    nd=fl(lat.netDebt);if(nd==null){const td=fl(lat.totalDebt),cash=fl(lat.cashAndShortTermInvestments);nd=(td!=null&&cash!=null)?td-cash:null;}}}
  if(nd!=null&&ebitda&&ebitda>0){
    const nde=nd/ebitda;let sr=rs(nde,CFG.risk.anchor,CFG.risk.scale,-1);
    if(sr!=null&&nde>CFG.risk.distress_nde)sr=Math.min(sr,CFG.risk.distress_floor);
    out.risk=mkv('Balance sht',nde<=0?'net cash':`${nde.toFixed(1)}x`,sr,'abs ND/EBITDA 2.0x','Financials BS + EBITDA');
  } else out.risk=mkv('Balance sht','n/a',null,'BS field null','Financials BS');
  // 11 Dividend
  const dy=fl(H.DividendYield),payout=fl(H.PayoutRatio);
  if(dy&&dy>CFG.dividend.min_yield){
    let sd=rs(dy,CFG.dividend.base,CFG.dividend.scale,+1);
    if(sd!=null&&payout&&payout>CFG.dividend.payout_gate)sd*=CFG.dividend.gate_mult;
    out.dividend=mkv('Dividend',`${(dy*100).toFixed(1)}%`,sd,'abs 2% + payout gate','Highlights.DividendYield');
  } else out.dividend=mkv('Dividend','n/a',null,'0% \u2014 reinvests','Highlights.DividendYield','na');
  // 12 Size/liquidity
  const mcap=fl(H.MarketCapitalization);
  const dvol=vols.length>=20?closes.slice(-20).reduce((s,c,i)=>s+c*vols.slice(-20)[i],0)/20:null;
  if(dvol&&dvol>0){
    let ssz=rs(Math.log(dvol),Math.log(CFG.size.anchor),CFG.size.scale,+1);
    if(ssz!=null){ssz=Math.max(CFG.size.band_low,Math.min(CFG.size.band_high,ssz));
      if(dvol<CFG.size.illiquid_dvol)ssz=CFG.size.illiquid_s;}
    const vv=mkv('Size/liq',fmtLg(mcap),ssz,'abs $20M/day band','MarketCap + eod $vol');
    vv.mcap_num=mcap; out.size=vv;
  } else out.size=mkv('Size/liq','n/a',null,'no vol data','MarketCap + eod $vol');
  // Value-trap conditioner
  const gate=quality_s!=null?Math.max(0,Math.min(1,CFG.vt.gate_floor+CFG.vt.gate_quality*((quality_s+1)/2))):1.0;
  for(const k of['pe','relval'])if(out[k].present&&out[k].s>0){out[k].s=+(out[k].s*gate).toFixed(3);out[k].strength=Math.abs(out[k].s);}
  return out;
}

function computeMix(H,T){
  const mcap=fl(H.MarketCapitalization)||0;
  const gs=[fl(H.QuarterlyRevenueGrowthYOY),fl(H.QuarterlyEarningsGrowthYOY)].filter(x=>x!=null);
  const g=gs.length?gs.reduce((a,b)=>a+b,0)/gs.length:0;
  const roe=fl(H.ReturnOnEquityTTM)||0,nm=fl(H.ProfitMargin),pe=fl(H.PERatio);
  const dy=fl(H.DividendYield)||0,beta=fl(T&&T.Beta)||1.0,eps=fl(H.EarningsShare);
  const big=mcap>50e9;
  const sc={
    'high-growth':2.0*(g>0.20)+1.0*(g>0.12)+0.5*(dy<0.005)+0.5*(pe==null||pe>40),
    'established-compounder':1.5*big+1.0*(roe>0.12)+1.0*((nm||0)>0.10)+0.5*(pe!=null&&pe>0&&pe<35)+0.5*(g>0.03&&g<0.15),
    'deep-value-cyclical':1.0*(pe!=null&&pe>0&&pe<14)+1.0*(beta>1.1)+0.5*(g<0.03)+0.5*((nm!=null?nm:1)<0.05),
    'speculative-story':1.5*((nm!=null&&nm<0)||(eps!=null&&eps<0))+1.0*(beta>1.5)+0.5*(mcap<5e9),
    'dividend-income':1.5*(dy>0.03)+1.0*(beta<0.9)+0.5*(g<0.08)+0.5*big,
  };
  const ex={};let tot=0;for(const k in sc){ex[k]=Math.exp(sc[k]);tot+=ex[k];}
  const mix={};for(const k in ex)mix[k]=ex[k]/tot;
  return mix;
}

function computeWeights(mix,vectors){
  const w={};
  for(const k of KEYS){let wv=0;for(const a in mix)wv+=mix[a]*AW[a][k];w[k]=vectors[k].present?Math.max(wv,0.02):0.0;}
  const tot=Object.values(w).reduce((a,b)=>a+b,0)||1;
  for(const k of KEYS){w[k]/=tot;vectors[k].w=+w[k].toFixed(4);}
  return w;
}

function convictionJS(vectors){
  const present=KEYS.filter(k=>vectors[k].present);
  const tw=present.reduce((s,k)=>s+vectors[k].w,0);
  if(!tw)return null;
  const ws=present.reduce((s,k)=>s+vectors[k].s*vectors[k].w,0)/tw;
  return Math.max(1,Math.min(100,Math.round(50+50*ws)));
}

function setStatus(msg){document.getElementById('add-status').textContent=msg;}

async function addTicker(raw){
  const ticker=raw.toUpperCase().replace(/[^A-Z0-9.\-]/g,'');
  if(!ticker)return;
  if(stocks[ticker]){setStatus(`${ticker} already in table`);return;}
  setStatus(`Fetching ${ticker}\u2026`);
  try{
    const base='https://eodhd.com/api';
    const from=new Date(Date.now()-420*864e5).toISOString().slice(0,10);
    const [fund,eodArr]=await Promise.all([
      fetch(`${base}/fundamentals/${ticker}?api_token=${EODHD_KEY}&fmt=json`).then(r=>r.json()),
      fetch(`${base}/eod/${ticker}?api_token=${EODHD_KEY}&fmt=json&order=a&from=${from}`).then(r=>r.json()),
    ]);
    if(!fund||!fund.Highlights){setStatus(`${ticker}: not found or no data`);return;}
    const H=fund.Highlights||{},V=fund.Valuation||{},T=fund.Technicals||{};
    const Fbs=((fund.Financials||{}).Balance_Sheet||{}).quarterly||null;
    const name=(fund.General||{}).Name||ticker;
    const fund_asof=H.MostRecentQuarter||(fund.General||{}).UpdatedAt||'n/a';
    const eod=Array.isArray(eodArr)?eodArr:[];
    const closes=eod.map(d=>parseFloat(d.close)).filter(x=>!isNaN(x));
    const vols=eod.map((_,i)=>parseFloat(eod[i].volume)||0);
    const price=closes[closes.length-1]||null;
    const price_asof=eod.length?eod[eod.length-1].date:'n/a';
    const vectors=computeVectors(H,V,T,Fbs,closes,vols,price);
    const mix=computeMix(H,T);
    computeWeights(mix,vectors);
    const conv=convictionJS(vectors);
    const mixF={};for(const k in mix)if(mix[k]>0.03)mixF[k]=+mix[k].toFixed(3);
    const s={ticker,name,fund_asof,price_asof,basis_tag:'browser',conviction:conv,mix:mixF,vectors};
    stocks[ticker]=s;DATA.stocks.push(s);
    renderTable();
    setStatus(`Added ${ticker} \u00B7 conviction ${conv??'\u2013'}`);
    document.getElementById('add-input').value='';
  }catch(e){setStatus(`Error: ${e.message}`);}
}

document.getElementById('add-btn').addEventListener('click',()=>addTicker(document.getElementById('add-input').value));
document.getElementById('add-input').addEventListener('keydown',e=>{
  if(e.key==='Enter')addTicker(e.target.value);
});
</script>
